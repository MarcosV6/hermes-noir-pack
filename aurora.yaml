# ═══════════════════════════════════════════════════════════════
#  AURORA — The Command Center
#  "Where data streams meet the edge of space"
# ═══════════════════════════════════════════════════════════════

name: aurora
label: Aurora
description: "Deep indigo command center — electric cyan data streams, amber alerts, cockpit layout with animated grid overlay and corner brackets"

# ── PALETTE ───────────────────────────────────────────────────
palette:
  background:
    hex: '#020510'
    alpha: 1.0
  midground:
    hex: '#00f0ff'
    alpha: 1.0
  foreground:
    hex: '#ffffff'
    alpha: 0.0
  warmGlow: rgba(0, 240, 255, 0.25)
  noiseOpacity: 0.15

# ── TYPOGRAPHY ───────────────────────────────────────────────
typography:
  fontSans: '"Space Grotesk", "Inter", system-ui, sans-serif'
  fontMono: '"JetBrains Mono", "SF Mono", ui-monospace, monospace'
  fontDisplay: '"Orbitron", "Space Grotesk", sans-serif'
  fontUrl: https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap
  baseSize: 14px
  lineHeight: '1.5'
  letterSpacing: 0.03em

# ── LAYOUT ───────────────────────────────────────────────────
layout:
  radius: 0px
  density: compact
layoutVariant: cockpit

# ── ASSETS ───────────────────────────────────────────────────
assets:
  bg: 'linear-gradient(160deg, #020510 0%, #0a1628 30%, #0d1f3c 60%, #0a1628 100%)'
  hero: radial-gradient(ellipse 70% 40% at 50% 10%, rgba(0, 240, 255, 0.12) 0%, transparent 70%)

# ── COMPONENT STYLES ────────────────────────────────────────
componentStyles:
  card:
    background: 'linear-gradient(135deg, rgba(10, 22, 40, 0.95) 0%, rgba(5, 10, 20, 0.98) 100%)'
    border: '1px solid rgba(0, 240, 255, 0.15)'
    box-shadow: '0 0 30px rgba(0, 240, 255, 0.06), inset 0 1px 0 rgba(0, 240, 255, 0.1)'
    backdrop-filter: 'blur(20px)'
  header:
    background: 'linear-gradient(180deg, rgba(5, 10, 20, 0.98) 0%, rgba(5, 10, 20, 0.85) 100%)'
    border-bottom: '1px solid rgba(0, 240, 255, 0.2)'
    backdrop-filter: 'blur(20px)'
    box-shadow: '0 2px 40px rgba(0, 240, 255, 0.08)'
  badge:
    background: 'rgba(0, 240, 255, 0.1)'
    border: '1px solid rgba(0, 240, 255, 0.3)'
    color: '#00f0ff'
  tab:
    background: 'transparent'
    border-bottom: '2px solid transparent'
  progress:
    background: 'rgba(0, 240, 255, 0.1)'
  backdrop:
    background: 'rgba(2, 5, 16, 0.85)'
  page:
    background: 'transparent'

# ── COLOR OVERRIDES ─────────────────────────────────────────
colorOverrides:
  card: 'rgba(10, 22, 40, 0.95)'
  cardForeground: '#e8f4ff'
  primary: '#00f0ff'
  primaryForeground: '#020510'
  secondary: 'rgba(0, 240, 255, 0.1)'
  secondaryForeground: '#00f0ff'
  muted: 'rgba(10, 22, 40, 0.8)'
  mutedForeground: 'rgba(0, 240, 255, 0.5)'
  accent: '#00f0ff'
  accentForeground: '#020510'
  destructive: '#ff3a5c'
  destructiveForeground: '#ffffff'
  success: '#00ff88'
  warning: '#ffb800'
  border: 'rgba(0, 240, 255, 0.12)'
  input: 'rgba(0, 240, 255, 0.08)'
  ring: '#00f0ff'

# ── CUSTOM CSS ──────────────────────────────────────────────
customCSS: |
  /* ── Animated Grid Overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridShift 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridShift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(60px, 60px); }
  }

  /* ── Cyan Glow Pulse on Cards ── */
  [data-component="card"], .card, [role="listitem"] {
    position: relative;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  [data-component="card"]:hover, .card:hover {
    border-color: rgba(0, 240, 255, 0.4) !important;
    box-shadow:
      0 0 40px rgba(0, 240, 255, 0.12),
      0 0 80px rgba(0, 240, 255, 0.04),
      inset 0 1px 0 rgba(0, 240, 255, 0.2) !important;
    transform: translateY(-1px);
  }

  /* ── Corner Brackets on Cards ── */
  [data-component="card"]::before,
  [data-component="card"]::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border-color: rgba(0, 240, 255, 0.4);
    border-style: solid;
    transition: all 0.3s ease;
  }

  [data-component="card"]::before {
    top: -1px;
    left: -1px;
    border-width: 2px 0 0 2px;
  }

  [data-component="card"]::after {
    top: -1px;
    right: -1px;
    border-width: 2px 2px 0 0;
  }

  [data-component="card"]:hover::before,
  [data-component="card"]:hover::after {
    width: 20px;
    height: 20px;
    border-color: #00f0ff;
  }

  /* ── Status Badges Glow ── */
  .badge, [data-component="badge"] {
    animation: badgePulse 3s ease-in-out infinite;
  }

  @keyframes badgePulse {
    0%, 100% { box-shadow: 0 0 8px rgba(0, 240, 255, 0.2); }
    50% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
  }

  /* ── Cyan Text Gradient for Headings ── */
  h1, h2, h3, h4, [class*="heading"] {
    background: linear-gradient(135deg, #ffffff 0%, #00f0ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Custom Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: rgba(2, 5, 16, 0.8); }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #00f0ff, #0088aa);
    border-radius: 3px;
  }

  /* ── Selection Color ── */
  ::selection {
    background: rgba(0, 240, 255, 0.3);
    color: #ffffff;
  }

  /* ── Nav Link Hover Effect ── */
  nav a:hover, [role="navigation"] a:hover {
    color: #00f0ff !important;
    text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
  }

  /* ── Button Glow ── */
  button:hover {
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.15) !important;
    border-color: rgba(0, 240, 255, 0.4) !important;
  }

  /* ── Ambient Glow Orbs ── */
  body::after {
    content: '';
    position: fixed;
    top: -50%;
    right: -30%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(0, 240, 255, 0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 15s ease-in-out infinite;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-5%, 5%) scale(1.05); }
    66% { transform: translate(3%, -3%) scale(0.95); }
  }
