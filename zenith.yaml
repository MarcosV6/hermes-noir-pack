# ═══════════════════════════════════════════════════════════════
#  ZENITH — The Minimalist
#  "Frosted glass, cosmic violet, pure minimalism"
# ═══════════════════════════════════════════════════════════════

name: zenith
label: Zenith
description: "Ultra-minimal space black with cosmic violet glass panels, breathing animations, and refined particle effects"

# ── PALETTE ───────────────────────────────────────────────────
palette:
  background:
    hex: '#030308'
    alpha: 1.0
  midground:
    hex: '#7c3aed'
    alpha: 1.0
  foreground:
    hex: '#ffffff'
    alpha: 1.0
  warmGlow: rgba(124, 58, 237, 0.15)
  noiseOpacity: 0.08

# ── TYPOGRAPHY ───────────────────────────────────────────────
typography:
  fontSans: '"SF Pro Display", "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif'
  fontMono: '"SF Mono", "JetBrains Mono", ui-monospace, monospace'
  fontDisplay: '"SF Pro Display", "Inter", system-ui, sans-serif'
  fontUrl: https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap
  baseSize: 13px
  lineHeight: '1.55'
  letterSpacing: 0.03em

# ── LAYOUT ───────────────────────────────────────────────────
layout:
  radius: 12px
  density: compact

# ── ASSETS ───────────────────────────────────────────────────
assets:
  bg: 'linear-gradient(180deg, #030308 0%, #060612 50%, #030308 100%)'
  hero: radial-gradient(ellipse 70% 50% at 50% 30%, rgba(124, 58, 237, 0.06) 0%, transparent 60%)

# ── COMPONENT STYLES ────────────────────────────────────────
componentStyles:
  card:
    background: 'linear-gradient(135deg, rgba(20, 18, 35, 0.65) 0%, rgba(10, 10, 20, 0.75) 100%)'
    border: '1px solid rgba(124, 58, 237, 0.1)'
    box-shadow: '0 8px 32px rgba(0, 0, 0, 0.35), 0 2px 8px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.04)'
    backdrop-filter: 'blur(24px) saturate(1.3)'
  header:
    background: 'linear-gradient(180deg, rgba(8, 8, 16, 0.85) 0%, rgba(8, 8, 16, 0.75) 100%)'
    border-bottom: '1px solid rgba(124, 58, 237, 0.1)'
    backdrop-filter: 'blur(30px) saturate(1.4)'
    box-shadow: '0 4px 24px rgba(0, 0, 0, 0.25)'
  badge:
    background: 'rgba(124, 58, 237, 0.1)'
    border: '1px solid rgba(124, 58, 237, 0.2)'
    color: '#7c3aed'
  tab:
    background: 'transparent'
    border-bottom: '2px solid transparent'
  progress:
    background: 'rgba(124, 58, 237, 0.1)'
  backdrop:
    background: 'rgba(3, 3, 8, 0.85)'
  page:
    background: 'transparent'

# ── COLOR OVERRIDES ─────────────────────────────────────────
colorOverrides:
  card: 'rgba(12, 12, 22, 0.8)'
  cardForeground: '#ffffff'
  primary: '#7c3aed'
  primaryForeground: '#ffffff'
  secondary: 'rgba(124, 58, 237, 0.1)'
  secondaryForeground: '#7c3aed'
  muted: 'rgba(12, 12, 22, 0.7)'
  mutedForeground: 'rgba(124, 58, 237, 0.7)'
  accent: '#7c3aed'
  accentForeground: '#ffffff'
  destructive: '#ef4444'
  destructiveForeground: '#ffffff'
  success: '#22c55e'
  warning: '#eab308'
  border: 'rgba(124, 58, 237, 0.08)'
  input: 'rgba(124, 58, 237, 0.06)'
  ring: '#7c3aed'

# ── CUSTOM CSS ──────────────────────────────────────────────
customCSS: |
  /* ── Floating Particle Field with Depth ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 10% 20%, rgba(124, 58, 237, 0.4), transparent),
      radial-gradient(1px 1px at 30% 60%, rgba(124, 58, 237, 0.25), transparent),
      radial-gradient(2px 2px at 50% 10%, rgba(124, 58, 237, 0.45), transparent),
      radial-gradient(1px 1px at 70% 40%, rgba(124, 58, 237, 0.2), transparent),
      radial-gradient(1.5px 1.5px at 90% 70%, rgba(124, 58, 237, 0.35), transparent),
      radial-gradient(1px 1px at 15% 85%, rgba(124, 58, 237, 0.3), transparent),
      radial-gradient(1.5px 1.5px at 45% 45%, rgba(124, 58, 237, 0.2), transparent),
      radial-gradient(1px 1px at 80% 15%, rgba(124, 58, 237, 0.25), transparent),
      radial-gradient(2px 2px at 60% 75%, rgba(124, 58, 237, 0.35), transparent),
      radial-gradient(1px 1px at 25% 35%, rgba(124, 58, 237, 0.15), transparent);
    pointer-events: none;
    z-index: 0;
    animation: particlesDrift 35s linear infinite;
    mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
  }

  @keyframes particlesDrift {
    0% { transform: translateY(0) translateX(0); }
    25% { transform: translateY(-20px) translateX(10px); }
    50% { transform: translateY(-40px) translateX(-5px); }
    75% { transform: translateY(-20px) translateX(15px); }
    100% { transform: translateY(0) translateX(0); }
  }

  /* ── Subtle Glass Grid ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124, 58, 237, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124, 58, 237, 0.02) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
  }

  /* ── Glass Card with Breathing Glow ── */
  [data-component="card"], .card, [role="listitem"] {
    position: relative;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
    animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardEntrance {
    from {
      opacity: 0;
      transform: translateY(10px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  /* ── Inner Glow Border ── */
  [data-component="card"]::before,
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(124, 58, 237, 0.25), transparent 50%, rgba(124, 58, 237, 0.1));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  [data-component="card"]:hover,
  .card:hover {
    border-color: rgba(124, 58, 237, 0.2) !important;
    box-shadow:
      0 12px 40px rgba(0, 0, 0, 0.45),
      0 4px 12px rgba(0, 0, 0, 0.3),
      0 0 80px rgba(124, 58, 237, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 0.06) !important;
    animation: breathe 4s ease-in-out infinite;
  }

  [data-component="card"]:hover::before,
  .card:hover::before {
    opacity: 1;
  }

  @keyframes breathe {
    0%, 100% { box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), 0 4px 12px rgba(0, 0, 0, 0.3), 0 0 80px rgba(124, 58, 237, 0.08); }
    50% { box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5), 0 4px 16px rgba(0, 0, 0, 0.35), 0 0 100px rgba(124, 58, 237, 0.15); }
  }

  /* ── Bright White Text ── */
  body, p, span, div, li, td, th, a, label, input, textarea, h1, h2, h3, h4 {
    color: #ffffff !important;
  }

  /* ── Violet Gradient Headings ── */
  h1, h2, h3, h4, [class*="heading"] {
    background: linear-gradient(135deg, #ffffff 0%, #7c3aed 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  /* ── Muted Text ── */
  .text-muted, .muted, [class*="muted"], [class*="secondary"] {
    color: rgba(255, 255, 255, 0.5) !important;
  }

  /* ── Glass Badge ── */
  .badge, [data-component="badge"] {
    backdrop-filter: 'blur(12px)';
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    animation: badgePulse 4s ease-in-out infinite;
  }

  @keyframes badgePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0); }
    50% { box-shadow: 0 0 20px 2px rgba(124, 58, 237, 0.2); }
  }

  .badge:hover, [data-component="badge"]:hover {
    box-shadow: 0 0 24px rgba(124, 58, 237, 0.3);
    transform: scale(1.05);
  }

  /* ── Minimal Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(124, 58, 237, 0.25), rgba(124, 58, 237, 0.1));
    border-radius: 3px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, rgba(124, 58, 237, 0.4), rgba(124, 58, 237, 0.2));
    background-clip: content-box;
  }

  /* ── Selection ── */
  ::selection {
    background: rgba(124, 58, 237, 0.2);
    color: #ffffff;
  }

  /* ── Nav Link Hover ── */
  nav a:hover, [role="navigation"] a:hover {
    color: #7c3aed !important;
    text-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
  }

  /* ── Glass Button ── */
  button {
    backdrop-filter: 'blur(16px)';
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  button:hover {
    box-shadow: 0 0 24px rgba(124, 58, 237, 0.12) !important;
    border-color: rgba(124, 58, 237, 0.25) !important;
    transform: translateY(-2px);
  }

  /* ── Ambient Violet Glow ── */
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -15%;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 22s ease-in-out infinite;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(8%, -8%) scale(1.06); }
    66% { transform: translate(-5%, 5%) scale(0.94); }
  }

  /* ── Staggered Card Animations ── */
  [data-component="card"]:nth-child(1), .card:nth-child(1) { animation-delay: 0.05s; }
  [data-component="card"]:nth-child(2), .card:nth-child(2) { animation-delay: 0.1s; }
  [data-component="card"]:nth-child(3), .card:nth-child(3) { animation-delay: 0.15s; }
  [data-component="card"]:nth-child(4), .card:nth-child(4) { animation-delay: 0.2s; }
  [data-component="card"]:nth-child(5), .card:nth-child(5) { animation-delay: 0.25s; }
  [data-component="card"]:nth-child(6), .card:nth-child(6) { animation-delay: 0.3s; }
