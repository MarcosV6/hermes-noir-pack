# ═══════════════════════════════════════════════════════════════
#  ZENITH — The Minimalist
#  "Space black meets cosmic violet"
# ═══════════════════════════════════════════════════════════════

name: zenith
label: Zenith
description: "Ultra-minimal space black with cosmic violet accents — breathing animations, monospace typography, and particle effects"

# ── PALETTE ───────────────────────────────────────────────────
palette:
  background:
    hex: '#040408'
    alpha: 1.0
  midground:
    hex: '#8b5cf6'
    alpha: 1.0
  foreground:
    hex: '#ffffff'
    alpha: 0.0
  warmGlow: rgba(139, 92, 246, 0.15)
  noiseOpacity: 0.1

# ── TYPOGRAPHY ───────────────────────────────────────────────
typography:
  fontSans: '"Space Grotesk", "SF Mono", ui-monospace, monospace'
  fontMono: '"IBM Plex Mono", "JetBrains Mono", ui-monospace, monospace'
  fontDisplay: '"Space Grotesk", system-ui, sans-serif'
  fontUrl: https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap
  baseSize: 13px
  lineHeight: '1.6'
  letterSpacing: 0.04em

# ── LAYOUT ───────────────────────────────────────────────────
layout:
  radius: 0px
  density: compact

# ── ASSETS ───────────────────────────────────────────────────
assets:
  bg: 'linear-gradient(180deg, #040408 0%, #060610 50%, #040408 100%)'
  hero: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(139, 92, 246, 0.06) 0%, transparent 60%)

# ── COMPONENT STYLES ────────────────────────────────────────
componentStyles:
  card:
    background: 'rgba(8, 8, 14, 0.95)'
    border: '1px solid rgba(139, 92, 246, 0.08)'
    box-shadow: '0 2px 20px rgba(0, 0, 0, 0.3)'
  header:
    background: 'rgba(4, 4, 8, 0.95)'
    border-bottom: '1px solid rgba(139, 92, 246, 0.12)'
    backdrop-filter: 'blur(16px)'
  badge:
    background: 'rgba(139, 92, 246, 0.08)'
    border: '1px solid rgba(139, 92, 246, 0.2)'
    color: '#8b5cf6'
  tab:
    background: 'transparent'
    border-bottom: '1px solid transparent'
  progress:
    background: 'rgba(139, 92, 246, 0.08)'
  backdrop:
    background: 'rgba(4, 4, 8, 0.92)'
  page:
    background: 'transparent'

# ── COLOR OVERRIDES ─────────────────────────────────────────
colorOverrides:
  card: 'rgba(8, 8, 14, 0.95)'
  cardForeground: '#d4d4dc'
  primary: '#8b5cf6'
  primaryForeground: '#040408'
  secondary: 'rgba(139, 92, 246, 0.08)'
  secondaryForeground: '#8b5cf6'
  muted: 'rgba(8, 8, 14, 0.8)'
  mutedForeground: 'rgba(139, 92, 246, 0.4)'
  accent: '#8b5cf6'
  accentForeground: '#040408'
  destructive: '#ef4444'
  destructiveForeground: '#ffffff'
  success: '#22c55e'
  warning: '#eab308'
  border: 'rgba(139, 92, 246, 0.06)'
  input: 'rgba(139, 92, 246, 0.05)'
  ring: '#8b5cf6'

# ── CUSTOM CSS ──────────────────────────────────────────────
customCSS: |
  /* ── Floating Particle Field ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(139, 92, 246, 0.3), transparent),
      radial-gradient(1px 1px at 30% 60%, rgba(139, 92, 246, 0.2), transparent),
      radial-gradient(1.5px 1.5px at 50% 10%, rgba(139, 92, 246, 0.35), transparent),
      radial-gradient(1px 1px at 70% 40%, rgba(139, 92, 246, 0.2), transparent),
      radial-gradient(1px 1px at 90% 70%, rgba(139, 92, 246, 0.25), transparent),
      radial-gradient(1.5px 1.5px at 15% 85%, rgba(139, 92, 246, 0.3), transparent),
      radial-gradient(1px 1px at 45% 45%, rgba(139, 92, 246, 0.15), transparent),
      radial-gradient(1px 1px at 80% 15%, rgba(139, 92, 246, 0.2), transparent),
      radial-gradient(1.5px 1.5px at 60% 75%, rgba(139, 92, 246, 0.25), transparent),
      radial-gradient(1px 1px at 25% 35%, rgba(139, 92, 246, 0.15), transparent);
    pointer-events: none;
    z-index: 0;
    animation: particlesDrift 30s linear infinite;
  }

  @keyframes particlesDrift {
    0% { transform: translateY(0); }
    100% { transform: translateY(-100px); }
  }

  /* ── Subtle Grid ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(139, 92, 246, 0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139, 92, 246, 0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Breathing Card Glow ── */
  [data-component="card"], .card, [role="listitem"] {
    position: relative;
    transition: all 0.3s ease;
  }

  [data-component="card"]:hover,
  .card:hover {
    border-color: rgba(139, 92, 246, 0.2) !important;
    box-shadow:
      0 0 30px rgba(139, 92, 246, 0.08),
      0 0 60px rgba(139, 92, 246, 0.03) !important;
    animation: breathe 3s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 30px rgba(139, 92, 246, 0.08), 0 0 60px rgba(139, 92, 246, 0.03); }
    50% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.15), 0 0 80px rgba(139, 92, 246, 0.06); }
  }

  /* ── Violet Gradient Headings ── */
  h1, h2, h3, h4, [class*="heading"] {
    background: linear-gradient(135deg, #d4d4dc 0%, #8b5cf6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Status Badges ── */
  .badge, [data-component="badge"] {
    transition: all 0.3s ease;
  }

  .badge:hover, [data-component="badge"]:hover {
    box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
    border-color: rgba(139, 92, 246, 0.4);
  }

  /* ── Invisible Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(139, 92, 246, 0.2);
    border-radius: 2px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(139, 92, 246, 0.4);
  }

  /* ── Selection ── */
  ::selection {
    background: rgba(139, 92, 246, 0.2);
    color: #d4d4dc;
  }

  /* ── Nav Links ── */
  nav a:hover, [role="navigation"] a:hover {
    color: #8b5cf6 !important;
    text-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
  }

  /* ── Buttons ── */
  button {
    transition: all 0.2s ease;
  }

  button:hover {
    box-shadow: 0 0 15px rgba(139, 92, 246, 0.1) !important;
    border-color: rgba(139, 92, 246, 0.25) !important;
  }

  /* ── Monospace Everything ── */
  body, button, input, textarea {
    font-family: "IBM Plex Mono", "JetBrains Mono", ui-monospace, monospace;
  }
