# ═══════════════════════════════════════════════════════════════
#  OBSIDIAN — The Light Glass Theme
#  "Apple-inspired frosted glass on white"
# ═══════════════════════════════════════════════════════════════

name: obsidian
label: Obsidian
description: "Apple-inspired light glass theme with frosted panels, subtle depth, and premium readability"

# ── PALETTE ───────────────────────────────────────────────────
palette:
  background:
    hex: '#fafafa'
    alpha: 1.0
  midground:
    hex: '#5b6abf'
    alpha: 1.0
  foreground:
    hex: '#1a1a2e'
    alpha: 0.0
  warmGlow: rgba(91, 106, 191, 0.08)
  noiseOpacity: 0.05

# ── TYPOGRAPHY ───────────────────────────────────────────────
typography:
  fontSans: '"SF Pro Display", "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif'
  fontMono: '"SF Mono", "JetBrains Mono", ui-monospace, monospace'
  fontDisplay: '"SF Pro Display", "Inter", system-ui, sans-serif'
  fontUrl: https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap
  baseSize: 15px
  lineHeight: '1.5'
  letterSpacing: -0.01em

# ── LAYOUT ───────────────────────────────────────────────────
layout:
  radius: 20px
  density: comfortable

# ── ASSETS ───────────────────────────────────────────────────
assets:
  bg: 'linear-gradient(180deg, #fafafa 0%, #f0f0f5 50%, #fafafa 100%)'
  hero: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(91, 106, 191, 0.06) 0%, transparent 60%)

# ── COMPONENT STYLES ────────────────────────────────────────
componentStyles:
  card:
    background: 'linear-gradient(135deg, rgba(255, 255, 255, 0.75) 0%, rgba(250, 250, 255, 0.65) 100%)'
    border: '1px solid rgba(91, 106, 191, 0.12)'
    box-shadow: '0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.9)'
    backdrop-filter: 'blur(24px) saturate(1.3)'
  header:
    background: 'linear-gradient(180deg, rgba(255, 255, 255, 0.8) 0%, rgba(250, 250, 255, 0.7) 100%)'
    border-bottom: '1px solid rgba(91, 106, 191, 0.1)'
    backdrop-filter: 'blur(30px) saturate(1.4)'
    box-shadow: '0 4px 24px rgba(0, 0, 0, 0.04)'
  badge:
    background: 'rgba(91, 106, 191, 0.1)'
    border: '1px solid rgba(91, 106, 191, 0.2)'
    color: '#5b6abf'
  tab:
    background: 'transparent'
    border-bottom: '2px solid transparent'
  progress:
    background: 'rgba(91, 106, 191, 0.1)'
  backdrop:
    background: 'rgba(250, 250, 255, 0.85)'
  page:
    background: 'transparent'

# ── COLOR OVERRIDES ─────────────────────────────────────────
colorOverrides:
  card: 'rgba(255, 255, 255, 0.8)'
  cardForeground: '#1a1a2e'
  primary: '#5b6abf'
  primaryForeground: '#ffffff'
  secondary: 'rgba(91, 106, 191, 0.1)'
  secondaryForeground: '#5b6abf'
  muted: 'rgba(240, 240, 245, 0.8)'
  mutedForeground: 'rgba(91, 106, 191, 0.6)'
  accent: '#5b6abf'
  accentForeground: '#ffffff'
  destructive: '#ff3b5c'
  destructiveForeground: '#ffffff'
  success: '#34c759'
  warning: '#ff9500'
  border: 'rgba(91, 106, 191, 0.1)'
  input: 'rgba(91, 106, 191, 0.06)'
  ring: '#5b6abf'

# ── CUSTOM CSS ──────────────────────────────────────────────
customCSS: |
  /* ── Subtle Grain Texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    mix-blend-mode: multiply;
  }

  /* ── Glass Card with Premium Depth ── */
  [data-component="card"], .card, [role="listitem"] {
    position: relative;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }

  /* ── Top Highlight Border ── */
  [data-component="card"]::before,
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  [data-component="card"]:hover,
  .card:hover {
    border-color: rgba(91, 106, 191, 0.2) !important;
    box-shadow:
      0 16px 48px rgba(0, 0, 0, 0.1),
      0 4px 12px rgba(0, 0, 0, 0.06),
      0 0 80px rgba(91, 106, 191, 0.06),
      inset 0 1px 0 rgba(255, 255, 255, 1) !important;
    transform: translateY(-4px) scale(1.005);
  }

  [data-component="card"]:hover::before,
  .card:hover::before {
    opacity: 1;
  }

  /* ── Purple Gradient Headings ── */
  h1, h2, h3, h4, [class*="heading"] {
    background: linear-gradient(135deg, #1a1a2e 0%, #5b6abf 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  /* ── Glass Badge ── */
  .badge, [data-component="badge"] {
    backdrop-filter: 'blur(12px)';
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .badge:hover, [data-component="badge"]:hover {
    box-shadow: 0 0 24px rgba(91, 106, 191, 0.25);
    transform: scale(1.05);
  }

  /* ── Refined Scrollbar ── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(91, 106, 191, 0.3), rgba(91, 106, 191, 0.15));
    border-radius: 4px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, rgba(91, 106, 191, 0.5), rgba(91, 106, 191, 0.25));
    background-clip: content-box;
  }

  /* ── Selection ── */
  ::selection {
    background: rgba(91, 106, 191, 0.2);
    color: #1a1a2e;
  }

  /* ── Nav Link Hover ── */
  nav a:hover, [role="navigation"] a:hover {
    color: #5b6abf !important;
    text-shadow: 0 0 15px rgba(91, 106, 191, 0.2);
  }

  /* ── Glass Button ── */
  button {
    backdrop-filter: 'blur(16px)';
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  button:hover {
    box-shadow: 0 0 24px rgba(91, 106, 191, 0.12) !important;
    border-color: rgba(91, 106, 191, 0.25) !important;
    transform: translateY(-2px);
  }

  /* ── Ambient Purple Glow ── */
  body::after {
    content: '';
    position: fixed;
    top: -10%;
    left: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, rgba(91, 106, 191, 0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 20s ease-in-out infinite;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(10%, 10%) scale(1.1); }
  }
