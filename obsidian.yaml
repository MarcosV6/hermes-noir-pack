# ═══════════════════════════════════════════════════════════════
#  OBSIDIAN — The Light Glass Theme
#  "Apple-inspired frosted glass on white"
# ═══════════════════════════════════════════════════════════════

name: obsidian
label: Obsidian
description: "Apple-inspired light glass theme with frosted panels, subtle depth, and premium readability"

# ── PALETTE ───────────────────────────────────────────────────
palette:
  background:
    hex: '#fafafa'
    alpha: 1.0
  midground:
    hex: '#5b6abf'
    alpha: 1.0
  foreground:
    hex: '#0a0a0a'
    alpha: 1.0
  warmGlow: rgba(91, 106, 191, 0.08)
  noiseOpacity: 0.05

# ── TYPOGRAPHY ───────────────────────────────────────────────
typography:
  fontSans: '"SF Pro Display", "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif'
  fontMono: '"SF Mono", "JetBrains Mono", ui-monospace, monospace'
  fontDisplay: '"SF Pro Display", "Inter", system-ui, sans-serif'
  fontUrl: https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap
  baseSize: 15px
  lineHeight: '1.5'
  letterSpacing: -0.01em

# ── LAYOUT ───────────────────────────────────────────────────
layout:
  radius: 20px
  density: comfortable

# ── ASSETS ───────────────────────────────────────────────────
assets:
  bg: 'linear-gradient(180deg, #fafafa 0%, #f0f0f5 50%, #fafafa 100%)'
  hero: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(91, 106, 191, 0.06) 0%, transparent 60%)

# ── COMPONENT STYLES ────────────────────────────────────────
componentStyles:
  card:
    background: 'linear-gradient(135deg, rgba(255, 255, 255, 0.88) 0%, rgba(250, 250, 255, 0.78) 100%)'
    border: '1px solid rgba(91, 106, 191, 0.12)'
    box-shadow: '0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.9)'
    backdrop-filter: 'blur(24px) saturate(1.3)'
  header:
    background: 'linear-gradient(180deg, rgba(255, 255, 255, 0.85) 0%, rgba(250, 250, 255, 0.75) 100%)'
    border-bottom: '1px solid rgba(91, 106, 191, 0.1)'
    backdrop-filter: 'blur(30px) saturate(1.4)'
    box-shadow: '0 4px 24px rgba(0, 0, 0, 0.04)'
  badge:
    background: 'rgba(91, 106, 191, 0.1)'
    border: '1px solid rgba(91, 106, 191, 0.2)'
    color: '#4b5563'
  tab:
    background: 'transparent'
    border-bottom: '2px solid transparent'
  progress:
    background: 'rgba(91, 106, 191, 0.1)'
  backdrop:
    background: 'rgba(250, 250, 255, 0.85)'
  page:
    background: 'transparent'

# ── COLOR OVERRIDES ─────────────────────────────────────────
colorOverrides:
  card: 'rgba(255, 255, 255, 0.8)'
  cardForeground: '#0a0a0a'
  primary: '#5b6abf'
  primaryForeground: '#ffffff'
  secondary: 'rgba(91, 106, 191, 0.1)'
  secondaryForeground: '#4b5563'
  muted: 'rgba(240, 240, 245, 0.8)'
  mutedForeground: '#4b5563'
  accent: '#5b6abf'
  accentForeground: '#ffffff'
  destructive: '#ff3b5c'
  destructiveForeground: '#ffffff'
  success: '#34c759'
  warning: '#ff9500'
  border: 'rgba(91, 106, 191, 0.1)'
  input: 'rgba(91, 106, 191, 0.06)'
  ring: '#5b6abf'

# ── CUSTOM CSS ──────────────────────────────────────────────
customCSS: |
  /* ── Animated Mesh Gradient Background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(at 40% 20%, rgba(91, 106, 191, 0.08) 0px, transparent 50%),
      radial-gradient(at 80% 0%, rgba(139, 92, 246, 0.06) 0px, transparent 50%),
      radial-gradient(at 0% 50%, rgba(91, 106, 191, 0.05) 0px, transparent 50%),
      radial-gradient(at 80% 50%, rgba(139, 92, 246, 0.04) 0px, transparent 50%),
      radial-gradient(at 0% 100%, rgba(91, 106, 191, 0.06) 0px, transparent 50%);
    pointer-events: none;
    z-index: 0;
    animation: meshShift 20s ease-in-out infinite;
  }

  @keyframes meshShift {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.1) rotate(2deg); }
  }

  /* ── Glass Card with Premium Depth ── */
  [data-component="card"], .card, [role="listitem"] {
    position: relative;
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
    animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardEntrance {
    from {
      opacity: 0;
      transform: translateY(10px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  /* ── Animated Border Gradient ── */
  [data-component="card"]::before,
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(
      135deg,
      rgba(91, 106, 191, 0.3),
      rgba(139, 92, 246, 0.2),
      rgba(91, 106, 191, 0.1)
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  /* ── Top Highlight Border ── */
  [data-component="card"]::after,
  .card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 20%;
    right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.9), transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  [data-component="card"]:hover,
  .card:hover {
    border-color: rgba(91, 106, 191, 0.25) !important;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.12),
      0 8px 24px rgba(0, 0, 0, 0.08),
      0 0 100px rgba(91, 106, 191, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 1) !important;
    transform: translateY(-5px) scale(1.008);
  }

  [data-component="card"]:hover::before,
  .card:hover::before {
    opacity: 1;
  }

  [data-component="card"]:hover::after,
  .card:hover::after {
    opacity: 1;
  }

  /* ── Headings with High Contrast ── */
  h1, h2, h3, h4, [class*="heading"] {
    color: #0a0a0a !important;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  /* ── Glass Badge with Pulse ── */
  .badge, [data-component="badge"] {
    backdrop-filter: 'blur(12px)';
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    color: #4b5563 !important;
    animation: badgePulse 4s ease-in-out infinite;
  }

  @keyframes badgePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(91, 106, 191, 0); }
    50% { box-shadow: 0 0 20px 2px rgba(91, 106, 191, 0.15); }
  }

  .badge:hover, [data-component="badge"]:hover {
    box-shadow: 0 0 30px rgba(91, 106, 191, 0.3);
    transform: scale(1.08);
  }

  /* ── Refined Scrollbar ── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(91, 106, 191, 0.35), rgba(139, 92, 246, 0.2));
    border-radius: 4px;
    border: 2px solid transparent;
    background-clip: content-box;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, rgba(91, 106, 191, 0.5), rgba(139, 92, 246, 0.3));
    background-clip: content-box;
  }

  /* ── Selection ── */
  ::selection {
    background: rgba(91, 106, 191, 0.25);
    color: #0a0a0a;
  }

  /* ── Nav Link Hover with Glow ── */
  nav a:hover, [role="navigation"] a:hover {
    color: #5b6abf !important;
    text-shadow: 0 0 20px rgba(91, 106, 191, 0.3);
    transition: all 0.3s ease;
  }

  /* ── Glass Button with Ripple ── */
  button {
    backdrop-filter: 'blur(16px)';
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }

  button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.2) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  button:hover {
    box-shadow: 0 0 30px rgba(91, 106, 191, 0.15) !important;
    border-color: rgba(91, 106, 191, 0.3) !important;
    transform: translateY(-2px);
  }

  button:hover::before {
    opacity: 1;
  }

  /* ── Body Text Readability ── */
  body, p, span, div, li, td, th, a, label, input, textarea {
    color: #0a0a0a !important;
  }

  /* ── Muted Text ── */
  .text-muted, .muted, [class*="muted"], [class*="secondary"] {
    color: #4b5563 !important;
  }

  /* ── Floating Ambient Orbs ── */
  body::after {
    content: '';
    position: fixed;
    top: -10%;
    left: -10%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(91, 106, 191, 0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 25s ease-in-out infinite;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(15%, 10%) scale(1.1); }
    50% { transform: translate(5%, 20%) scale(0.95); }
    75% { transform: translate(20%, 5%) scale(1.05); }
  }

  /* ── Staggered Card Animations ── */
  [data-component="card"]:nth-child(1), .card:nth-child(1) { animation-delay: 0.05s; }
  [data-component="card"]:nth-child(2), .card:nth-child(2) { animation-delay: 0.1s; }
  [data-component="card"]:nth-child(3), .card:nth-child(3) { animation-delay: 0.15s; }
  [data-component="card"]:nth-child(4), .card:nth-child(4) { animation-delay: 0.2s; }
  [data-component="card"]:nth-child(5), .card:nth-child(5) { animation-delay: 0.25s; }
  [data-component="card"]:nth-child(6), .card:nth-child(6) { animation-delay: 0.3s; }
