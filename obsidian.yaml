# ═══════════════════════════════════════════════════════════════
#  OBSIDIAN — The Luxury Theme
#  "Pure volcanic black meets molten gold"
# ═══════════════════════════════════════════════════════════════

name: obsidian
label: Obsidian
description: "Pure volcanic black with warm amber/gold accents — premium, luxurious, and effortlessly elegant"

# ── PALETTE ───────────────────────────────────────────────────
palette:
  background:
    hex: '#010101'
    alpha: 1.0
  midground:
    hex: '#c9a04a'
    alpha: 1.0
  foreground:
    hex: '#ffffff'
    alpha: 0.0
  warmGlow: rgba(201, 160, 74, 0.18)
  noiseOpacity: 0.08

# ── TYPOGRAPHY ───────────────────────────────────────────────
typography:
  fontSans: '"DM Sans", "Inter", system-ui, sans-serif'
  fontMono: '"JetBrains Mono", "SF Mono", ui-monospace, monospace'
  fontDisplay: '"Playfair Display", "Georgia", serif'
  fontUrl: https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap
  baseSize: 15px
  lineHeight: '1.6'
  letterSpacing: 0.01em

# ── LAYOUT ───────────────────────────────────────────────────
layout:
  radius: 12px
  density: comfortable

# ── ASSETS ───────────────────────────────────────────────────
assets:
  bg: 'linear-gradient(180deg, #010101 0%, #080604 50%, #010101 100%)'
  hero: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201, 160, 74, 0.08) 0%, transparent 60%)

# ── COMPONENT STYLES ────────────────────────────────────────
componentStyles:
  card:
    background: 'linear-gradient(145deg, rgba(15, 13, 10, 0.95) 0%, rgba(5, 4, 3, 0.98) 100%)'
    border: '1px solid rgba(201, 160, 74, 0.1)'
    box-shadow: '0 4px 30px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(201, 160, 74, 0.05)'
    backdrop-filter: 'blur(20px)'
  header:
    background: 'linear-gradient(180deg, rgba(1, 1, 1, 0.98) 0%, rgba(8, 6, 4, 0.9) 100%)'
    border-bottom: '1px solid rgba(201, 160, 74, 0.15)'
    backdrop-filter: 'blur(20px)'
    box-shadow: '0 4px 30px rgba(0, 0, 0, 0.3)'
  badge:
    background: 'rgba(201, 160, 74, 0.12)'
    border: '1px solid rgba(201, 160, 74, 0.25)'
    color: '#c9a04a'
  tab:
    background: 'transparent'
    border-bottom: '2px solid transparent'
  progress:
    background: 'rgba(201, 160, 74, 0.1)'
  backdrop:
    background: 'rgba(1, 1, 1, 0.9)'
  page:
    background: 'transparent'

# ── COLOR OVERRIDES ─────────────────────────────────────────
colorOverrides:
  card: 'rgba(15, 13, 10, 0.95)'
  cardForeground: '#f0e6d3'
  primary: '#c9a04a'
  primaryForeground: '#010101'
  secondary: 'rgba(201, 160, 74, 0.1)'
  secondaryForeground: '#c9a04a'
  muted: 'rgba(15, 13, 10, 0.8)'
  mutedForeground: 'rgba(201, 160, 74, 0.45)'
  accent: '#c9a04a'
  accentForeground: '#010101'
  destructive: '#ff4444'
  destructiveForeground: '#ffffff'
  success: '#4ade80'
  warning: '#fbbf24'
  border: 'rgba(201, 160, 74, 0.08)'
  input: 'rgba(201, 160, 74, 0.06)'
  ring: '#c9a04a'

# ── CUSTOM CSS ──────────────────────────────────────────────
customCSS: |
  /* ── Gold Shimmer Background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(201, 160, 74, 0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(201, 160, 74, 0.02) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(201, 160, 74, 0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    animation: shimmerDrift 20s ease-in-out infinite;
  }

  @keyframes shimmerDrift {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* ── Card Hover with Gold Top Border ── */
  [data-component="card"], .card, [role="listitem"] {
    position: relative;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }

  [data-component="card"]::after,
  .card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #c9a04a, transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  [data-component="card"]:hover,
  .card:hover {
    border-color: rgba(201, 160, 74, 0.25) !important;
    box-shadow:
      0 8px 40px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(201, 160, 74, 0.15) !important;
    transform: translateY(-2px);
  }

  [data-component="card"]:hover::after,
  .card:hover::after {
    opacity: 1;
  }

  /* ── Gold Gradient Headings ── */
  h1, h2, h3, h4, [class*="heading"] {
    background: linear-gradient(135deg, #f0e6d3 0%, #c9a04a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Status Badges ── */
  .badge, [data-component="badge"] {
    box-shadow: 0 0 12px rgba(201, 160, 74, 0.15);
    transition: box-shadow 0.3s ease;
  }

  .badge:hover, [data-component="badge"]:hover {
    box-shadow: 0 0 24px rgba(201, 160, 74, 0.3);
  }

  /* ── Elegant Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #c9a04a, #8a6a2a);
    border-radius: 3px;
    opacity: 0.6;
  }
  ::-webkit-scrollbar-thumb:hover { opacity: 1; }

  /* ── Selection ── */
  ::selection {
    background: rgba(201, 160, 74, 0.25);
    color: #f0e6d3;
  }

  /* ── Nav Links ── */
  nav a:hover, [role="navigation"] a:hover {
    color: #c9a04a !important;
    text-shadow: 0 0 15px rgba(201, 160, 74, 0.3);
  }

  /* ── Buttons ── */
  button {
    transition: all 0.3s ease;
  }

  button:hover {
    box-shadow: 0 0 20px rgba(201, 160, 74, 0.12) !important;
    border-color: rgba(201, 160, 74, 0.3) !important;
    transform: translateY(-1px);
  }

  /* ── Ambient Gold Vignette ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(1, 1, 1, 0.4) 100%);
    pointer-events: none;
    z-index: 0;
  }
